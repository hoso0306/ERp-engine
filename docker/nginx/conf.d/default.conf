# Reverse proxy ERP — route theo path: /api/* sang container API, còn lại sang
# container Web. Global prefix Nest là "api" (xem apps/api/src/main.ts), nên
# proxy_pass KHÔNG có path phía sau host:port để giữ nguyên /api/... khi forward.
#
# Cert: Cloudflare Origin Certificate (mode Full Strict) — copy 2 file
# origin.pem / origin.key vào docker/nginx/certs/ trên VPS (không commit, xem
# docker/nginx/certs/.gitkeep).

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Khớp giới hạn body JSON 10mb đã set ở apps/api/src/main.ts (Company Settings
    # logo/con dấu base64) + biên độ an toàn.
    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
