services:
  postgres:
    image: postgres:17-alpine
    container_name: erp-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp123}
      POSTGRES_DB: ${DB_NAME:-erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
