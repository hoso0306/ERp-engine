name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Chỉ dùng để `prisma generate`/build đọc được biến môi trường — không kết nối DB thật.
      DATABASE_URL: postgresql://erp:erp123@localhost:5432/erp
      JWT_SECRET: ci-placeholder-secret
      NEXT_PUBLIC_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Build (typecheck)
        run: pnpm -r build

      - name: Test API
        run: pnpm --filter api test
