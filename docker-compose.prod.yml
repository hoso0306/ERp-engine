# Compose production — tách khỏi docker-compose.yml (chỉ Postgres cho dev).
# Nginx (docker/nginx/conf.d/default.conf) đứng trước, expose 80/443 ra host;
# api/web chỉ `expose` nội bộ trong mạng Docker, không lộ port ra ngoài trực tiếp.
#
# Chạy: docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  postgres:
    image: postgres:17-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: erp-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      # Đọc bởi apps/api/prisma/seed.ts khi chạy `docker compose exec api npx prisma db seed`.
      BOOTSTRAP_OWNER_EMAIL: ${BOOTSTRAP_OWNER_EMAIL}
      BOOTSTRAP_OWNER_NAME: ${BOOTSTRAP_OWNER_NAME}
    depends_on:
      - postgres
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: erp-web
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: erp-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
