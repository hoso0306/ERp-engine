# Compose production — tách khỏi docker-compose.yml (chỉ Postgres cho dev).
# Chưa có service Nginx — đó là mục 2.3 (🔴 chờ gần go-live, phụ thuộc quyết
# định SSL/domain thật). Trước khi có Nginx, `ports` bên dưới expose thẳng ra
# host để còn test được; khi thêm Nginx sẽ đổi lại thành `expose` nội bộ.
#
# Chạy: docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  postgres:
    image: postgres:17-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: erp-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    depends_on:
      - postgres
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: erp-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
